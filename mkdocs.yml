site_name: ML & Forecasting Wiki
site_description: Teamwiki für Machine Learning, Time Series Forecasting und Data Science
site_url: https://themanbetterknownasthemachine.github.io/ml-wiki/

docs_dir: wiki

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Dark Mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Light Mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/themanbetterknownasthemachine/ml-wiki
repo_name: ml-wiki

plugins:
  - search:
      lang: de
  - roamlinks

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - meta

nav:
  - Übersicht: index.md
  - Entities:
    - N-HiTS: entity/n-hits.md
    - SARIMAX: entity/sarimax.md
    - Foundation Models: entity/foundation-models-zeitreihen.md
  - Concepts:
    - Backtesting: concept/backtesting.md
    - Foundation Model vs. N-HiTS: concept/foundation-model-vs-nhits.md
    - Hyperparameter-Tuning (Optuna): concept/hyperparameter-tuning-optuna.md
    - SHAP Explainability: concept/shap-explainability.md
    - Feature Engineering Zeitreihen: concept/feature-engineering-zeitreihen.md
  - Decisions:
    - ADR-001 N-HiTS statt Prophet: decision/adr-001-nhits-statt-prophet.md
  - Sources:
    - Chronos-2 Paper: source/chronos-2-paper.md
  - Log: log.md
